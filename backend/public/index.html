<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>DevOps Monitoring Dashboard</h1>

    <div class="container">

        <div class="card">
            <h2>CPU Usage</h2>
            <p id="cpu">Loading...</p>
        </div>

        <div class="card">
            <h2>Total Memory</h2>
            <p id="totalMemory">Loading...</p>
        </div>

        <div class="card">
            <h2>Used Memory</h2>
            <p id="usedMemory">Loading...</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
